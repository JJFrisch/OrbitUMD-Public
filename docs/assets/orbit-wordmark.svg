<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 220" role="img" aria-labelledby="title desc">
  <title id="title">OrbitUMD wordmark</title>
  <desc id="desc">A horizontal brand wordmark with an orbit icon and the OrbitUMD name.</desc>
  <rect width="840" height="220" fill="none" />
  <g transform="translate(36 32)">
    <g transform="rotate(-28 78 78)">
      <ellipse cx="78" cy="78" rx="64" ry="24" fill="none" stroke="#0F172A" stroke-opacity="0.22" stroke-width="8" />
      <circle cx="124" cy="62" r="8" fill="#F59E0B" />
    </g>
    <circle cx="78" cy="78" r="26" fill="#0F172A" />
    <circle cx="68" cy="68" r="7.5" fill="rgba(255,255,255,0.16)" />
  </g>
  <g transform="translate(196 0)" fill="#0F172A" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="118" font-size="74" font-weight="700" letter-spacing="0.5">Orbit</text>
    <text x="220" y="118" font-size="74" font-weight="800" fill="#F59E0B" letter-spacing="0.4">UMD</text>
    <rect x="0" y="142" width="380" height="8" rx="4" fill="#0F172A" opacity="0.08" />
  </g>
</svg>